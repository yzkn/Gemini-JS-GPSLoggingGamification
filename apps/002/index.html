<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>高速道路RTA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://unpkg.com/maplibre-gl@3.x/dist/maplibre-gl.css" rel="stylesheet" />
  <style>
    /* モノスペース数字フォントの調整 */
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&display=swap');

    .font-mono {
      font-family: 'JetBrains+Mono', monospace;
    }

    /* 地図の微調整 */
    .maplibregl-ctrl-attrib {
      display: none;
    }
  </style>
</head>

<body class="bg-slate-950 text-slate-100 overflow-hidden font-sans select-none">

  <div id="app" class="flex flex-col h-[100dvh]">

    <!-- メイン画面 -->
    <main class="flex-1 relative">
      <!-- Map Container -->
      <div id="map" class="absolute inset-0 w-full h-full grayscale-[0.2] brightness-[0.8]"></div>

      <!-- TOP HUD: 次のCP情報 -->
      <div class="absolute top-4 inset-x-4 z-10">
        <div class="bg-slate-900/80 backdrop-blur-md border border-slate-700/50 p-4 rounded-2xl shadow-2xl">
          <div class="flex justify-between items-start mb-1">
            <span class="text-[10px] font-bold uppercase tracking-widest text-slate-400">Next Checkpoint</span>
            <span id="target-index" class="text-[10px] bg-blue-600 px-2 py-0.5 rounded-full font-bold">CP 1/--</span>
          </div>
          <div class="flex justify-between items-end">
            <h2 id="next-cp-name" class="text-2xl font-black text-blue-400 truncate max-w-[60%]">待機中...</h2>
            <div class="text-right">
              <span id="next-cp-dist" class="text-5xl font-mono font-bold text-yellow-400 leading-none">0.00</span>
              <span class="text-sm font-bold text-yellow-400 ml-1">km</span>
            </div>
          </div>
        </div>
      </div>

      <!-- RIGHT HUD: 速度計 -->
      <div class="absolute bottom-28 right-4 z-10">
        <div
          class="bg-slate-900/90 border-2 border-slate-700 w-28 h-28 rounded-full flex flex-col items-center justify-center shadow-xl ring-4 ring-black/50">
          <div class="text-[10px] font-bold text-slate-500 uppercase">Speed</div>
          <div id="current-speed" class="text-4xl font-mono font-bold text-white leading-none">0</div>
          <div class="text-[10px] font-bold text-slate-500">km/h</div>
        </div>
      </div>

      <!-- LEFT HUD: ラップ簡易表示 -->
      <div id="last-cp-info" class="absolute bottom-28 left-4 z-10 hidden">
        <div class="bg-black/60 backdrop-blur-sm border-l-4 border-blue-500 p-3 rounded-r-lg">
          <div class="text-[10px] text-slate-400 font-bold uppercase">Last Pass</div>
          <div id="last-cp-name" class="text-sm font-bold">---</div>
          <div id="last-cp-time" class="text-xl font-mono text-blue-300">00:00.0</div>
        </div>
      </div>
    </main>

    <!-- コントロールバー -->
    <nav
      class="h-24 bg-slate-900 border-t border-slate-800 flex items-center justify-around px-6 z-20 shadow-[0_-10px_20px_rgba(0,0,0,0.5)]">
      <div class="flex flex-col items-center">
        <button id="btn-start"
          class="group bg-blue-600 hover:bg-blue-500 active:scale-95 transition-all px-10 py-4 rounded-2xl shadow-lg shadow-blue-900/40">
          <span class="text-xl font-black uppercase tracking-tighter">Start Race</span>
        </button>
        <button id="btn-stop"
          class="hidden bg-rose-600 hover:bg-rose-500 active:scale-95 transition-all px-10 py-4 rounded-2xl shadow-lg shadow-rose-900/40">
          <span class="text-xl font-black uppercase tracking-tighter">Stop</span>
        </button>
      </div>
    </nav>

    <!-- スタート設定モーダル -->
    <div id="start-modal"
      class="fixed inset-0 bg-slate-950/90 backdrop-blur-sm flex items-center justify-center p-6 z-50">
      <div class="bg-slate-900 border border-slate-800 p-8 rounded-[2rem] max-w-sm w-full shadow-2xl">
        <div class="text-center mb-8">
          <div class="inline-block p-3 bg-blue-600/20 rounded-2xl mb-4">
            <svg class="w-8 h-8 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
            </svg>
          </div>
          <h1 class="text-3xl font-black tracking-tighter text-white">HIGHWAY RTA</h1>
          <p class="text-xs text-slate-500 mt-2 font-bold uppercase tracking-widest">Performance Tracker</p>
        </div>

        <div class="space-y-4">
          <div>
            <label class="text-[10px] font-bold text-slate-500 uppercase ml-2 mb-1 block">Select Route</label>
            <select id="route-select"
              class="w-full bg-slate-800 border border-slate-700 p-4 rounded-2xl text-white font-bold focus:ring-2 ring-blue-500 outline-none appearance-none">
              <!-- JSで挿入 -->
            </select>
          </div>

          <div class="p-4 bg-amber-900/20 border border-amber-700/30 rounded-2xl">
            <p class="text-[11px] text-amber-200/80 leading-relaxed font-medium">
              【警告】走行中の操作は法律で禁止されています。画面を注視せず、音声ガイドに従ってください。
            </p>
          </div>

          <button id="btn-agree-start"
            class="w-full bg-blue-600 hover:bg-blue-500 text-white py-5 rounded-2xl font-black text-xl shadow-xl shadow-blue-900/30 active:scale-[0.98] transition-all">
            同意して開始
          </button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
